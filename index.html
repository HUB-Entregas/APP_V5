<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>
  // Sem motorista logado, manda para a tela de login (aba separada).
  if (!localStorage.getItem('motoristaSelecionado')) {
    window.location.replace('./login.html');
  }
</script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12203A">
<title>Comprovante de Entrega</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<header class="topo">
  <h1>📦 Comprovante de Entrega</h1>
  <div class="status-wrap">
    <span id="statusDot" class="dot dot-offline"></span>
    <span id="statusTexto">Carregando…</span>
    <span id="badgePendentes" class="badge hidden">0</span>
  </div>
</header>

<main>
  <div id="aviso" class="aviso hidden"></div>

  <form id="formEntrega">
    <div class="campo">
      <div class="eyebrow"><span class="num">01</span><label>Motorista</label></div>
      <div id="motoristaAtual" class="motorista-atual">
        <span id="motoristaAtualNome"></span>
        <button type="button" id="trocarMotorista">Trocar</button>
      </div>
    </div>

    <div class="campo">
      <div class="eyebrow"><span class="num">02</span><label for="recebedor">Nome do recebedor</label></div>
      <input type="text" id="recebedor" placeholder="Ex: João Silva" autocomplete="name" autocapitalize="words" required>
    </div>

    <div class="campo">
      <div class="eyebrow"><span class="num">03</span><label>Fotos da entrega</label></div>
      <div class="fotos-slots">
        <button type="button" class="foto-slot" id="slotPacote">
          <img class="foto-slot-img" id="fotoPacotePreview" alt="Foto do pacote">
          <span class="foto-slot-rotulo">📦 Pacote</span>
          <span class="foto-slot-check">✓</span>
        </button>
        <button type="button" class="foto-slot" id="slotFachada">
          <img class="foto-slot-img" id="fotoFachadaPreview" alt="Foto da fachada">
          <span class="foto-slot-rotulo">🏠 Fachada</span>
          <span class="foto-slot-check">✓</span>
        </button>
      </div>
      <button type="button" id="btnCamera" class="btn-camera">📷 Tirar as 2 fotos</button>
      <!-- fallback: usado só se a câmera ao vivo não estiver disponível -->
      <input type="file" id="fotoPacoteInput" accept="image/*" capture="environment" class="hidden">
      <input type="file" id="fotoFachadaInput" accept="image/*" capture="environment" class="hidden">
    </div>

    <div class="campo">
      <div class="eyebrow"><span class="num">04</span><label for="observacao">Observação (opcional)</label></div>
      <textarea id="observacao" placeholder="Ex: entregue na portaria"></textarea>
    </div>
  </form>

  <div class="secao-historico">
    <div class="secao-historico-topo">
      <h2>Últimos comprovantes</h2>
      <button type="button" id="btnSincronizar">Sincronizar agora</button>
    </div>
    <div id="listaHistorico"></div>
  </div>

  <footer class="rodape-discreto">
    <a href="./relatorio.html">📊 Meu desempenho</a>
    <a href="./admin.html" target="_blank" rel="noopener">Painel do administrador</a>
  </footer>
</main>

<div id="cameraOverlay" class="camera-overlay hidden">
  <video id="cameraVideo" class="camera-video" playsinline autoplay muted></video>
  <div class="camera-topo">
    <button type="button" id="cameraFechar" class="camera-fechar" aria-label="Fechar câmera">✕</button>
    <span id="cameraRotulo" class="camera-rotulo"></span>
  </div>
  <div class="camera-controles">
    <button type="button" id="cameraDisparo" class="camera-disparo" aria-label="Tirar foto"></button>
  </div>
</div>

<div class="barra-envio">
  <button type="submit" form="formEntrega" class="btn-enviar">Enviar comprovante</button>
</div>

<script src="./config.js"></script>
<script src="./app.js"></script>
</body>
</html>
